name: Bug Report
description: Report a bug in Handoff
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Start the server with '...'
        2. Call endpoint '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages and logs)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Server/SDK version or commit hash
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server
        - SDK
        - Protocol
        - Docker/Deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Python version, OS, database backend"
      placeholder: "Python 3.12, Ubuntu 24.04, PostgreSQL 16"
