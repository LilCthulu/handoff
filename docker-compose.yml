version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: handoff
      POSTGRES_PASSWORD: handoff
      POSTGRES_DB: handoff
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handoff"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://handoff:handoff@postgres:5432/handoff
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # To load cloud extensions: HANDOFF_EXTENSIONS=handoff_cloud.routes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
